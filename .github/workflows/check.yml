name: Debrecen ingatlan/árverés figyelő

on:
  schedule:
    # minden órában, a 0. percben (UTC idő szerint)
    - cron: "0 * * * *"
  workflow_dispatch: {}  # kézzel is elindítható a GitHub felületén, "Run workflow" gombbal

permissions:
  contents: write  # kell ahhoz, hogy a state.json változásait vissza tudja commitolni

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python telepítése
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Függőségek telepítése
        run: pip install -r requirements.txt

      - name: Szkript futtatása
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python scraper.py

      - name: Állapot elmentése (state.json visszaírása a repóba)
        run: |
          git config user.name "debrecen-ertesito-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Állapot frissítve [automatikus]"
          git push
